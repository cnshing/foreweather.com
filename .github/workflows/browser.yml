name: Publish browser release

run-name: Publish browser using devcontainer:${{ inputs.image_tag }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Devcontainer image tag"
        required: false
        type: string
        default: "latest"

  workflow_call:
    inputs:
      image_tag:
        description: "Devcontainer image tag"
        required: false
        type: string
        default: "latest"
    secrets:
      CLOUDFLARE_DEPLOY_PAGES:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

permissions:
  contents: read
  packages: read
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/devcontainer
      PUBLISH_DIR: artifacts/browser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish browser inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ inputs.image_tag }}
          cacheFrom: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          push: never
          runCmd: |
            dotnet publish src/Foreweather.Browser \
              -c Release \
              -o ${{ env.PUBLISH_DIR }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_PAGES }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: >
            pages deploy ${{ env.PUBLISH_DIR }}/wwwroot
            --project-name=foreweather-com
            --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment URL
        run: echo "${{ steps.deploy.outputs.deployment-url }}"