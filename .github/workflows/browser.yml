name: Publish browser release

run-name: Publish browser using devcontainer:${{ inputs.image_tag }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Devcontainer image tag"
        required: false
        type: string
        default: "latest"

  workflow_call:
    inputs:
      image_tag:
        description: "Devcontainer image tag"
        required: false
        type: string
        default: "latest"
    secrets:
      NETLIFY_DEPLOY_TOKEN:
        required: true
      NETLIFY_SITE_ID:
        required: true

permissions:
  contents: read
  packages: read
  deployments: write

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/devcontainer
      PUBLISH_DIR: artifacts/browser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish browser inside devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ inputs.image_tag }}
          cacheFrom: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          push: never
          runCmd: |
            dotnet publish src/Foreweather.Browser \
              -c Release \
              -o ${{ env.PUBLISH_DIR }}

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ${{ env.PUBLISH_DIR }}/wwwroot
          production-branch: main
          production-deploy: ${{ github.ref_name == 'main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy using devcontainer:${{ inputs.image_tag }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_DEPLOY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Print deployment URL
        run: echo "${{ steps.deploy.outputs.deploy-url }}"