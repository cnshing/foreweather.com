name: Build Dev Container

run-name: ${{ inputs.push && 'Build and push' || 'Build' }} devcontainer:${{ inputs.image_tag }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag"
        required: false
        type: string
        default: "latest"
      push:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      image_tag:
        description: "Image tag"
        required: false
        type: string
        default: "latest"
      push:
        description: "Push image to GHCR"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-devcontainer:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/devcontainer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ${{ inputs.push && 'Build and push' || 'Build' }} ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ inputs.image_tag }}
          cacheFrom: ${{ env.IMAGE_NAME }}
          push: ${{ inputs.push && 'always' || 'never' }}